{% extends "base.html" %}

{% block title %}Constancia · Certificado{% endblock %}

{% block content %}
<div class="card" style="max-width: 840px; margin: 0 auto; text-align: center; padding: 48px; position: relative;">
    {% if no_valido %}
    <div class="watermark">NO VÁLIDO</div>
    {% endif %}

    <img src="/static/logo.png" width="120" alt="Logo">
    <h1 class="section-title" style="margin-top: 32px;">Constancia</h1>
    <p class="section-subtitle">Se otorga la presente constancia a:</p>
    <h2 style="font-size: 2.4rem; margin: 16px 0 6px; color: var(--accent-strong);">{{ nombre }}</h2>
    <p class="text-muted" style="margin: 0 0 20px;">Por haber completado el curso</p>
    <h3 style="margin: 0; font-size: 1.7rem; color: #0f172a;">{{ curso }}</h3>
</div>
{% endblock %}
