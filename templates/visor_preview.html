<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de previsualizacion</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #222;
        }
        .contenedor {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }
        .watermark-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(70vw, 900px);
            transform: translate(-50%, -50%) rotate(-28deg);
            opacity: 0.13;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="contenedor" id="app" data-session="{{ session_id }}" data-row="{{ row_id }}" data-datos='{{ datos_json }}'>
        <iframe id="preview-frame"></iframe>
        <img class="watermark-img" src="/static/watermark.png" alt="Marca de agua">
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const appDiv = document.getElementById('app');
            const sessionId = appDiv.getAttribute('data-session');
            const rowId = parseInt(appDiv.getAttribute('data-row'), 10);
            
            let datosStr = appDiv.getAttribute('data-datos');
            let datos = {};
            try {
                if (datosStr && datosStr.trim() && datosStr !== '{}') {
                    datos = JSON.parse(datosStr);
                }
            } catch (e) {
                console.error('Error parsing datos:', e);
                console.log('Datos string:', datosStr);
            }
            
            // Construir URL con parámetros dinámicos
            let url = `/preview/${sessionId}/${rowId}?`;
            const params = [];
            if (datos && typeof datos === 'object') {
                for (const [key, value] of Object.entries(datos)) {
                    params.push(`${key}=${encodeURIComponent(value)}`);
                }
            }
            url += params.join('&');
            
            document.getElementById('preview-frame').src = url;
        });
    </script>
</body>
</html>
