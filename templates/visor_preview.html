<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de previsualizacion</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #222;
        }
        .contenedor {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }
        .watermark-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: min(70vw, 900px);
            transform: translate(-50%, -50%) rotate(-28deg);
            opacity: 0.13;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <iframe src="/preview/{{ session_id }}/{{ row_id }}?nombre={{ nombre | urlencode }}&curso={{ curso | urlencode }}"></iframe>
        <img class="watermark-img" src="/static/watermark.png" alt="Marca de agua">
    </div>
</body>
</html>
