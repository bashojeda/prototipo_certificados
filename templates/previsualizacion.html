<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Previsualizacion de certificados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
        }
        .acciones {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
    <h2>Previsualizacion editable</h2>
    <p>Edita los datos, revisa cada PDF con marca de agua y luego genera solo los seleccionados.</p>

    <form action="/generar-final" method="post" id="form-final">
        <input type="hidden" name="session_id" value="{{ session_id }}">

        <label>
            <input type="checkbox" id="seleccionar-todos" checked>
            Seleccionar todos
        </label>

        <table>
            <thead>
                <tr>
                    <th>Seleccionar</th>
                    {% for var in variables %}
                    <th>{{ var }}</th>
                    {% endfor %}
                    <th>Previsualizar PDF</th>
                </tr>
            </thead>
            <tbody>
                {% for idx, row in rows %}
                <tr>
                    <td>
                        <input type="checkbox" class="selector" name="selected_ids" value="{{ idx }}" checked>
                    </td>
                    {% for var in variables %}
                    <td>
                        <input type="text" id="{{ var }}_{{ idx }}" name="{{ var }}_{{ idx }}" value="{{ row.get(var, '') }}" required>
                    </td>
                    {% endfor %}
                    <td>
                        <button type="button" onclick="abrirPreview('{{ idx }}')">Ver PDF</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="acciones">
            <button type="submit">Generar PDFs finales</button>
            <a href="/">Volver</a>
        </div>
    </form>

    <div id="config" data-variables='{{ variables_json }}' style="display:none;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const configDiv = document.getElementById('config');
            let variablesStr = configDiv.getAttribute('data-variables');
            let variables = [];
            
            try {
                if (variablesStr && variablesStr.trim() && variablesStr !== '[]') {
                    variables = JSON.parse(variablesStr);
                }
            } catch (e) {
                console.error('Error parsing variables:', e);
                console.log('Variables string:', variablesStr);
            }
            
            const seleccionarTodos = document.getElementById('seleccionar-todos');
            const selectors = document.querySelectorAll('.selector');

            seleccionarTodos.addEventListener('change', function () {
                selectors.forEach((cb) => {
                    cb.checked = this.checked;
                });
            });

            selectors.forEach((cb) => {
                cb.addEventListener('change', function () {
                    const total = selectors.length;
                    const marcados = Array.from(selectors).filter((x) => x.checked).length;
                    seleccionarTodos.checked = marcados === total;
                });
            });

            window.abrirPreview = function(idx) {
                idx = parseInt(idx, 10);
                const sessionId = "{{ session_id }}";
                let url = `/visor-preview/${sessionId}/${idx}?`;
                
                // Construir parámetros dinámicamente desde los inputs
                const params = [];
                variables.forEach(var_name => {
                    const input = document.getElementById(`${var_name}_${idx}`);
                    if (input) {
                        const valor = input.value;
                        params.push(`${var_name}=${encodeURIComponent(valor)}`);
                    }
                });
                
                url += params.join('&');
                window.open(url, '_blank');
            };
        });
    </script>
</body>
</html>
