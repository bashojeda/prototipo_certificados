<!DOCTYPE html>
{% extends "base.html" %}

{% block title %}Iniciar sesión · Certificados{% endblock %}

{% block content %}
<div class="card" style="max-width: 540px; margin: 0 auto;">
    <h1 class="section-title">Iniciar sesión</h1>
    <p class="section-subtitle">Accede al panel de generación de certificados.</p>

    <form action="/login" method="post" class="form-grid">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>

        <div class="actions-row">
            <button type="submit" class="btn-primary btn-wide">Entrar</button>
        </div>
    </form>

    <p class="text-muted" style="margin-top: 18px;">{{ message }}</p>
</div>
{% endblock %}
